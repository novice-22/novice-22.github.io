name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Actions 탭에서 수동 실행 버튼
  # 자동 재빌드(12시간마다) — 사이트 비공개 기간이라 잠시 꺼둠.
  # 다시 켜려면 아래 두 줄 주석 해제 (00:00, 12:00 UTC = 한국시간 09시·21시)
  # schedule:
  #   - cron: "0 0,12 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        with:
          node-version: 22
        # Notion 연동 (ON) — Settings → Secrets → Actions 에 등록된 값 전달
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
